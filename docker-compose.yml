services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: active
      POSTGRES_PASSWORD: active
      POSTGRES_DB: active_defense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U active -d active_defense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  mock-ml:
    build:
      context: ./services/mock-ml
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://active:active@postgres:5432/active_defense
      REDIS_URL: redis://redis:6379/0
      ML_RISK_URL: http://mock-ml:8081
      SMTP_HOST: mailhog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-ml:
        condition: service_healthy
      mailhog:
        condition: service_started
    command: >
      sh -c "python scripts/seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
