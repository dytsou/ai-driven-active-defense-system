<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MFA Verification</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.5rem; }
    button { margin-top: 1rem; padding: 0.6rem 1rem; }
  </style>
</head>
<body>
  <h1>Email Verification</h1>
  <p>Enter the 6-digit code sent to your email.</p>
  <input id="otp" maxlength="6" placeholder="000000" />
  <button id="send">Send code</button>
  <button id="verify">Verify</button>
  <p id="status"></p>
  <script>
    const challengeId = "{{ challenge_id }}";
    const status = document.getElementById("status");
    document.getElementById("send").onclick = async () => {
      status.textContent = "Sending...";
      const res = await fetch("/api/v1/auth/mfa/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ challenge_id: challengeId }),
      });
      const body = await res.json();
      status.textContent = body.message || body.status;
    };
    document.getElementById("verify").onclick = async () => {
      status.textContent = "Verifying...";
      const res = await fetch("/api/v1/auth/mfa/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ challenge_id: challengeId, otp: document.getElementById("otp").value }),
      });
      const body = await res.json();
      if (body.status === "success") {
        window.location.href = "/admin/events";
        return;
      }
      status.textContent = body.message || body.status;
    };
  </script>
</body>
</html>
