<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Threat Monitor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Threat Intelligence Monitor</h1>
  <p>Polling every 3 seconds.</p>
  <table>
    <thead>
      <tr><th>Time</th><th>Type</th><th>User</th><th>IP</th><th>Details</th></tr>
    </thead>
    <tbody id="events"></tbody>
  </table>
  <script>
    async function refresh() {
      const res = await fetch("/admin/api/events");
      if (!res.ok) {
        document.getElementById("events").innerHTML =
          `<tr><td colspan="5">Unauthorized (${res.status})</td></tr>`;
        return;
      }
      const data = await res.json();
      const rows = data.events.map((event) => `
        <tr>
          <td>${event.created_at || ""}</td>
          <td>${event.event_type}</td>
          <td>${event.actor_username || ""}</td>
          <td>${event.ip_address || ""}</td>
          <td><code>${JSON.stringify(event.payload || {})}</code></td>
        </tr>`).join("");
      document.getElementById("events").innerHTML = rows || `<tr><td colspan="5">No events</td></tr>`;
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
